<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Raiders</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; max-width: 100vw; max-height: 100vh; }
</style>

<canvas id="c"></canvas>
<script>
// ============================================================
// STAR RAIDERS — Browser Clone
// ============================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 640, H = 400;
canvas.width = W; canvas.height = H;

// Scale canvas to fit viewport
function resizeCanvas() {
    const aspect = W / H;
    let cw = window.innerWidth, ch = window.innerHeight;
    if (cw / ch > aspect) { cw = ch * aspect; } else { ch = cw / aspect; }
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================================
// CONSTANTS
// ============================================================
const FOCAL = 200;
const HUD_H = 80;
const VIEW_H = H - HUD_H;
const STAR_COUNT = 100;
const MAX_SPEED = 9;
const MAX_ENERGY = 9999;
const TORPEDO_SPEED = 800;
const TORPEDO_LIFE = 2.0;
const TORPEDO_COST = 50;
const TORPEDO_COOLDOWN = 0.3;
const HIT_RADIUS = 35;
const PLAYER_HIT_RADIUS = 45;
const DOCK_RANGE = 120;
const DOCK_SPEED = 1;
const HYPERWARP_DURATION = 3.5;

const COLORS = {
    bg: '#000000',
    star1: '#FFFFFF', star2: '#8888FF', star3: '#444488',
    hud_bg: '#0a0a2a', hud_border: '#0066FF', hud_text: '#00FF88',

    torpedo_player: '#44FFFF', torpedo_enemy: '#FF8800',

    grid: '#003388', grid_light: '#0055CC',

const DIFFICULTY = [

    { name: 'PILOT',      groups: 12, fireInterval: 3.0, accuracy: 0.45, sbTimer: 50, aiDodge: 0.15 },
    { name: 'WARRIOR',    groups: 20, fireInterval: 2.0, accuracy: 0.60, sbTimer: 40, aiDodge: 0.30 },

// Input

// ============================================================
// INPUT HANDLING
// ============================================================
document.addEventListener('keydown', e => {
    if (!keys[e.code]) justPressed[e.code] = true;
    keys[e.code] = true;
    ensureAudio();
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', () => { ensureAudio(); });
canvas.addEventListener('touchstart', () => { ensureAudio(); });

function isPressed(code) { return !!keys[code]; }
function wasJustPressed(code) { return !!justPressed[code]; }

function pollGamepad() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    const gp = gamepads[0];
    if (!gp) return null;

    const deadzone = 0.2;
    const axes = {
        lx: Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0,
        ly: Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0,
    };

    // Button mapping (standard gamepad)
    const buttons = {
        a: gp.buttons[0]?.pressed,       // fire
        b: gp.buttons[1]?.pressed,       // shields
        x: gp.buttons[2]?.pressed,       // computer
        y: gp.buttons[3]?.pressed,       // hyperwarp
        lb: gp.buttons[4]?.pressed,      // speed down
        rb: gp.buttons[5]?.pressed,      // speed up
        lt: gp.buttons[6]?.pressed || (gp.buttons[6]?.value > 0.5),  // shields alt
        rt: gp.buttons[7]?.pressed || (gp.buttons[7]?.value > 0.5),  // fire alt
        select: gp.buttons[8]?.pressed,  // galactic
        start: gp.buttons[9]?.pressed,   // cycle views
        dpadUp: gp.buttons[12]?.pressed,
        dpadDown: gp.buttons[13]?.pressed,
        dpadLeft: gp.buttons[14]?.pressed,
        dpadRight: gp.buttons[15]?.pressed,
    };

    // Track just-pressed for buttons
    const gJust = {};
    for (const k in buttons) {
        gJust[k] = buttons[k] && !gpButtonStates[k];
    }
    gpButtonStates = { ...buttons };

    return { axes, buttons, justPressed: gJust };
}

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    try {
        ensureAudio();
        const ac = audioCtx;
        if (!ac || ac.state === 'suspended') return;
        const now = ac.currentTime;

        if (type === 'fire') {
            let bufSrc = ac.createBufferSource();
            let buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.15), ac.sampleRate);
            let d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/d.length);
            bufSrc.buffer = buf;
            let filter = ac.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.value = 900; filter.Q.value = 2;
            let gain = ac.createGain(); gain.gain.setValueAtTime(0.3, now);
            bufSrc.connect(filter); filter.connect(gain); gain.connect(ac.destination);
            bufSrc.start(now); bufSrc.stop(now + 0.15);
        }
        else if (type === 'explosion') {
            let osc = ac.createOscillator(); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(now); osc.stop(now + 0.5);
            // noise layer
            let bufSrc = ac.createBufferSource();
            let buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.5), ac.sampleRate);
            let d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/d.length);
            bufSrc.buffer = buf;
            let eg = ac.createGain(); eg.gain.setValueAtTime(0.3, now); eg.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            bufSrc.connect(eg); eg.connect(ac.destination);
            bufSrc.start(now); bufSrc.stop(now + 0.5);
        }
        else if (type === 'hit') {
            let osc = ac.createOscillator(); osc.type = 'sine';
            osc.frequency.value = 1200;
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(now); osc.stop(now + 0.08);
        }
        else if (type === 'playerHit') {
            let osc = ac.createOscillator(); osc.type = 'square';
            osc.frequency.value = 100;
            let lfo = ac.createOscillator(); lfo.frequency.value = 20;
            let lfoGain = ac.createGain(); lfoGain.gain.value = 50;
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(now); lfo.start(now); osc.stop(now + 0.35); lfo.stop(now + 0.35);
        }
        else if (type === 'hyperwarp') {
            // White noise through bandpass filter with rising frequency
            let bufLen = Math.floor(ac.sampleRate * HYPERWARP_DURATION);
            let buf = ac.createBuffer(1, bufLen, ac.sampleRate);
            let d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
            let src = ac.createBufferSource();
            src.buffer = buf;
            let filter = ac.createBiquadFilter();
            filter.type = 'bandpass';
            filter.Q.value = 3;
            filter.frequency.setValueAtTime(300, now);
            filter.frequency.exponentialRampToValueAtTime(4000, now + HYPERWARP_DURATION * 0.8);
            filter.frequency.setValueAtTime(4000, now + HYPERWARP_DURATION * 0.8);
            filter.frequency.exponentialRampToValueAtTime(300, now + HYPERWARP_DURATION);
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.01, now);
            gain.gain.linearRampToValueAtTime(0.35, now + 0.5);
            gain.gain.setValueAtTime(0.35, now + HYPERWARP_DURATION - 0.5);
            gain.gain.linearRampToValueAtTime(0.01, now + HYPERWARP_DURATION);
            src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
            src.start(now); src.stop(now + HYPERWARP_DURATION);
        }
        else if (type === 'alert') {
            for (let i = 0; i < 4; i++) {
                let osc = ac.createOscillator(); osc.type = 'square';
                osc.frequency.value = i % 2 === 0 ? 440 : 880;
                let gain = ac.createGain();
                gain.gain.setValueAtTime(0.15, now + i * 0.15);
                gain.gain.setValueAtTime(0, now + (i+1) * 0.15);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(now + i * 0.15); osc.stop(now + (i+1) * 0.15);
            }
        }
        else if (type === 'dock') {
            let osc = ac.createOscillator(); osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(800, now + 0.3);
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(now); osc.stop(now + 0.5);
        }
        else if (type === 'select') {
            let osc = ac.createOscillator(); osc.type = 'square';
            osc.frequency.value = 660;
            let gain = ac.createGain();
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(now); osc.stop(now + 0.06);
        }
    } catch(e) {
        console.warn('Audio error:', e);
    }
}

// ============================================================
// UTILITY
// ============================================================
function dist3D(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
    return Math.sqrt(dx*dx + dy*dy + dz*dz);
}

function project(x, y, z) {
    if (z <= 10) return null;
    const scale = FOCAL / z;
    return { sx: W/2 + x * scale, sy: VIEW_H/2 - y * scale, scale };
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function randRange(a, b) { return a + Math.random() * (b - a); }

function randInt(a, b) { return Math.floor(randRange(a, b + 1)); }

function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

// World-to-view transform: converts world position to camera-relative coordinates
function worldToView(wx, wy, wz, aft) {
    let dx = wx - player.px;
    let dy = wy - player.py;
    let dz = wz - player.pz;

    let yaw = player.headYaw;
    let pitch = player.headPitch;
    if (aft) { yaw += Math.PI; pitch = -pitch; }

    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const cp = Math.cos(pitch), sp = Math.sin(pitch);

    // Yaw rotation (around Y)
    let vx = dx * cy - dz * sy;
    let vz = dx * sy + dz * cy;

    // Pitch rotation (around X)
    let vy = dy * cp - vz * sp;
    vz = dy * sp + vz * cp;

    return { x: vx, y: vy, z: vz };
}

function projectWorld(wx, wy, wz, aft) {
    const v = worldToView(wx, wy, wz, aft);
    return project(v.x, v.y, v.z);
}

// ============================================================
// STAR GENERATION
// ============================================================
const STAR_RANGE = 1200;
function generateStars() {
    stars = [];
    const px = player.px || 0, py = player.py || 0, pz = player.pz || 0;
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
            x: px + randRange(-STAR_RANGE, STAR_RANGE),
            y: py + randRange(-STAR_RANGE * 0.6, STAR_RANGE * 0.6),
            z: pz + randRange(-STAR_RANGE, STAR_RANGE),
        });
    }
}

function wrapStars() {
    const r = STAR_RANGE;
    for (let s of stars) {
        if (s.x - player.px >  r) s.x -= r * 2;
        if (s.x - player.px < -r) s.x += r * 2;
        if (s.y - player.py >  r * 0.6) s.y -= r * 1.2;
        if (s.y - player.py < -r * 0.6) s.y += r * 1.2;
        if (s.z - player.pz >  r) s.z -= r * 2;
        if (s.z - player.pz < -r) s.z += r * 2;
    }
}

// ============================================================
// GALAXY GENERATION
// ============================================================
function generateGalaxy() {
    galaxy = { sectors: [], playerSector: { x: 0, y: 0 }, totalEnemies: 0 };

    for (let i = 0; i < 16 * 8; i++) {
        galaxy.sectors.push({ enemies: 0, starbase: false });
    }

    // Place enemy groups — each occupied sector gets 1-6 enemies
    let placed = 0;
    while (placed < diff.groups) {
        const x = randInt(0, 15), y = randInt(0, 7);
        const idx = y * 16 + x;
        if (galaxy.sectors[idx].enemies === 0) {
            const count = randInt(1, 6);
            galaxy.sectors[idx].enemies = count;
            placed += count;
            galaxy.totalEnemies += count;
        }
    }

    // Place starbases (3-4, spread out)
    const sbCount = randInt(3, 4);
    for (let i = 0; i < sbCount; i++) {
        let attempts = 0;
        while (attempts < 100) {
            const x = randInt(i * 4, i * 4 + 3);
            const y = randInt(0, 7);
            const idx = y * 16 + x;
            if (!galaxy.sectors[idx].starbase) {
                galaxy.sectors[idx].starbase = true;
                break;
            }
            attempts++;
        }
    }

    // Place player in empty sector
    let px, py;
    do {
        px = randInt(0, 15); py = randInt(0, 7);
    } while (galaxy.sectors[py * 16 + px].enemies > 0);
    galaxy.playerSector = { x: px, y: py };

    // Clear enemies from player start
    galaxy.sectors[py * 16 + px].enemies = 0;
}

function getSector(x, y) {
    if (x < 0 || x > 15 || y < 0 || y > 7) return null;
    return galaxy.sectors[y * 16 + x];
}

function currentSectorData() {
    return getSector(galaxy.playerSector.x, galaxy.playerSector.y);
}

// ============================================================
// SECTOR INITIALIZATION
// ============================================================
function initSector() {
    const sd = currentSectorData();
    sector = {
        enemies: [],
        torpedoes: [],
        enemyTorpedoes: [],
        starbase: null,
        sbTimer: -1,
        docked: false,
    };
    explosions = [];
    mothershipTimer = randRange(15, 40);
    mothershipActive = false;

    // Reset player position for new sector, keep heading
    player.px = 0; player.py = 0; player.pz = 0;

    // Spawn enemies — count matches galactic chart exactly
    if (sd.enemies > 0) {
        const count = sd.enemies;
        for (let i = 0; i < count; i++) {
            const types = ['warrior','warrior','cruiser','basestar'];
            const weights = difficultyIndex === 0 ? [0,1] :
                           difficultyIndex === 1 ? [0,1,2] :
                           [0,1,2,3];
            const type = types[pick(weights)];
            const et = ENEMY_TYPES[type];
            // Spawn ahead of the player in world space
            const angle = player.headYaw + randRange(-0.8, 0.8);
            const dist = randRange(500, 1500);
            sector.enemies.push({
                type, hp: et.hp, maxHp: et.hp,
                x: Math.sin(angle) * dist + randRange(-200, 200),
                y: randRange(-150, 150),
                z: Math.cos(angle) * dist,
                vx: 0, vy: 0, vz: 0,
                fireCooldown: randRange(1, diff.fireInterval),
                aiState: 'approach',
                aiTimer: randRange(2, 5),
                dead: false,
            });
        }

        // Starbase under attack timer
        if (sd.starbase) {
            sector.sbTimer = diff.sbTimer;
        }
    }

    // Spawn starbase
    if (sd.starbase) {
        const sbAngle = player.headYaw + randRange(-0.5, 0.5);
        sector.starbase = {
            x: Math.sin(sbAngle) * 600 + randRange(-80, 80),
            y: randRange(-40, 40),
            z: Math.cos(sbAngle) * 600,
        };
    }
}

// ============================================================
// PLAYER INIT
// ============================================================
function initPlayer() {
    player = {
        energy: MAX_ENERGY,
        shields: true,
        speed: 0,
        // World position and heading
        px: 0, py: 0, pz: 0,
        headYaw: 0, headPitch: 0,
        // Rotation rates (set per frame by input)
        yawRate: 0, pitchRate: 0,
        systems: {
            engines: 1, shields: 1, computer: 1,
            longRangeScan: 1, subspaceRadio: 1, photonTorpedoes: 1,
        },
        torpedoCooldown: 0,
        computerOn: true,
        score: 0,
        enemiesDestroyed: 0,
        energyUsed: 0,
        starbasesLost: 0,
    };
}

// ============================================================
// GAME INIT
// ============================================================
let waveNumber = 1;

function startGame() {
    waveNumber = 1;
    diff = DIFFICULTY[difficultyIndex];
    initPlayer();
    generateGalaxy();
    generateStars();
    stardate = 0;
    stardateLimit = 200 + diff.groups * 5;
    galCursor = { ...galaxy.playerSector };
    initSector();
    alertMessage = '';
    alertTimer = 0;
    victoryDelay = -1;
    hsEntry = false;
    hsName = '';
    hsSaved = false;
    setState(State.FRONT_VIEW);
}

function advanceWave() {
    waveNumber++;
    // Increase difficulty: more enemy groups each wave
    const extraGroups = waveNumber * 4;
    const totalGroups = diff.groups + extraGroups;

    // Regenerate galaxy with more enemies
    generateGalaxy();
    // Override enemy count with scaled amount
    let placed = 0;
    // Clear default placement
    for (let s of galaxy.sectors) s.enemies = 0;
    galaxy.totalEnemies = 0;
    while (placed < totalGroups) {
        const x = randInt(0, 15), y = randInt(0, 7);
        const idx = y * 16 + x;
        if (galaxy.sectors[idx].enemies === 0) {
            const count = randInt(1, 6);
            galaxy.sectors[idx].enemies = count;
            placed += count;
            galaxy.totalEnemies += count;
        }
    }
    // Ensure player start sector is clear
    const ps = galaxy.playerSector;
    galaxy.totalEnemies -= galaxy.sectors[ps.y * 16 + ps.x].enemies;
    galaxy.sectors[ps.y * 16 + ps.x].enemies = 0;

    // Extend time limit for the new wave
    stardateLimit += 100 + totalGroups * 2;

    galCursor = { ...galaxy.playerSector };
    generateStars();
    initSector();
    victoryDelay = -1;

    // Auto-hyperwarp to nearest enemy sector
    let bestDist = Infinity, bestX = ps.x, bestY = ps.y;
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 16; x++) {
            if (galaxy.sectors[y * 16 + x].enemies > 0) {
                const d = Math.abs(x - ps.x) + Math.abs(y - ps.y);
                if (d < bestDist) { bestDist = d; bestX = x; bestY = y; }
            }
        }
    }

    warpTarget = { x: bestX, y: bestY };
    warpFrom = { ...galaxy.playerSector };
    warpTimer = HYPERWARP_DURATION;
    // Reset heading so warp always goes straight forward
    player.headYaw = 0;
    player.headPitch = 0;
    player.yawRate = 0;
    player.pitchRate = 0;
    playSound('hyperwarp');
    alertMessage = `WAVE ${waveNumber} - NEW COMBAT ZONE`;
    alertTimer = 4;
    setState(State.HYPERWARP);
}

// ============================================================
// STATE MANAGEMENT
// ============================================================
function setState(newState) {
    if (newState === State.FRONT_VIEW || newState === State.AFT_VIEW) {
        prevViewState = newState;
    }
    currentState = newState;
}

// ============================================================
// UPDATE - STARS
// ============================================================
function updateStars(dt) {
    // Stars are in world space — just wrap around the player
    wrapStars();
}

// ============================================================
// UPDATE - ENEMIES
// ============================================================
function updateEnemies(dt) {
    for (let e of sector.enemies) {
        if (e.dead) continue;

        const et = ENEMY_TYPES[e.type];
        // Distance to player in world space
        const dx = player.px - e.x, dy = player.py - e.y, dz = player.pz - e.z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

        // AI state transitions
        e.aiTimer -= dt;
        if (e.aiTimer <= 0) {
            if (e.aiState === 'approach' && dist < 300) {
                e.aiState = 'strafe';
                e.vx = randRange(-1, 1) * et.speed;
                e.vy = randRange(-1, 1) * et.speed;
                e.vz = randRange(-0.5, 0.5) * et.speed;
            } else if (e.aiState === 'strafe') {
                e.aiState = dist > 600 ? 'approach' : 'strafe';
                e.vx = randRange(-1, 1) * et.speed;
                e.vy = randRange(-1, 1) * et.speed;
            } else {
                e.aiState = 'approach';
            }
            e.aiTimer = randRange(2, 5);
        }

        // Movement — approach the player
        if (e.aiState === 'approach') {
            const nd = dist || 1;
            e.vx = (dx / nd) * et.speed * 0.7;
            e.vy = (dy / nd) * et.speed * 0.5;
            e.vz = (dz / nd) * et.speed * 0.7;
        }

        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.z += e.vz * dt;

        // Keep enemies within chase range of player
        if (dist > 2500) {
            // Warp closer to player
            const nd = dist || 1;
            e.x += (dx / nd) * (dist - 1500);
            e.y += (dy / nd) * (dist - 1500) * 0.3;
            e.z += (dz / nd) * (dist - 1500);
        }

        // Dodge player torpedoes
        if (Math.random() < diff.aiDodge * dt) {
            for (const t of sector.torpedoes) {
                if (dist3D(t, e) < 150) {
                    e.vx += randRange(-200, 200);
                    e.vy += randRange(-200, 200);
                    break;
                }
            }
        }

        // Fire at player
        e.fireCooldown -= dt;
        if (e.fireCooldown <= 0 && dist < 1500) {
            e.fireCooldown = diff.fireInterval * randRange(0.7, 1.3);
            const nd = dist || 1;
            const acc = diff.accuracy;
            const spread = (1 - acc) * 200;
            sector.enemyTorpedoes.push({
                x: e.x, y: e.y, z: e.z,
                vx: (dx / nd) * 300 + randRange(-spread, spread),
                vy: (dy / nd) * 300 + randRange(-spread, spread),
                vz: (dz / nd) * 300,
                life: 3.0,
            });
        }
    }

    sector.enemies = sector.enemies.filter(e => !e.dead);
}

// ============================================================
// UPDATE - TORPEDOES
// ============================================================
function updateTorpedoes(dt) {
    // Player torpedoes
    for (let t of sector.torpedoes) {
        t.x += t.vx * dt;
        t.y += t.vy * dt;
        t.z += t.vz * dt;
        t.life -= dt;

        // Check hits on enemies
        for (let e of sector.enemies) {
            if (e.dead) continue;
            if (dist3D(t, e) < HIT_RADIUS) {
                e.hp--;
                t.life = 0;
                playSound('hit');
                if (e.hp <= 0) {
                    e.dead = true;
                    spawnExplosion(e.x, e.y, e.z);
                    playSound('explosion');
                    player.score += ENEMY_TYPES[e.type].points;
                    player.enemiesDestroyed++;

                    if (e.type === 'mothership') {
                        alertMessage = 'MOTHERSHIP DESTROYED - 1000 PTS';
                        alertTimer = 3;
                    }

                    // Check if sector cleared (motherships don't count — they're bonus)
                    const alive = sector.enemies.filter(en => !en.dead && en.type !== 'mothership').length;
                    if (alive === 0) {
                        const sd = currentSectorData();
                        sd.enemies = 0;
                        galaxy.totalEnemies = 0;
                        for (const s of galaxy.sectors) galaxy.totalEnemies += s.enemies;
                        sector.sbTimer = -1;
                        // Delay victory check so explosion plays out
                        if (galaxy.totalEnemies <= 0) {
                            victoryDelay = 2.0;
                        }
                    }
                }
                break;
            }
        }
    }
    sector.torpedoes = sector.torpedoes.filter(t => t.life > 0);

    // Enemy torpedoes
    for (let t of sector.enemyTorpedoes) {
        t.x += t.vx * dt;
        t.y += t.vy * dt;
        t.z += t.vz * dt;
        t.life -= dt;

        // Hit detection against player world position
        const pdx = t.x - player.px, pdy = t.y - player.py, pdz = t.z - player.pz;
        if (Math.abs(pdx) < PLAYER_HIT_RADIUS && Math.abs(pdy) < PLAYER_HIT_RADIUS && Math.abs(pdz) < PLAYER_HIT_RADIUS) {
            t.life = 0;
            applyDamage(0.2);
        }
    }
    sector.enemyTorpedoes = sector.enemyTorpedoes.filter(t => t.life > 0);
}

// ============================================================
// DAMAGE
// ============================================================
function applyDamage(amount) {
    playSound('playerHit');
    flashAlpha = 0.6;

    if (player.shields && player.systems.shields > 0) {
        amount *= (1 - player.systems.shields * 0.7);
    }

    // Damage random system
    const sysKeys = SYSTEM_KEYS.filter(k => player.systems[k] > 0);
    if (sysKeys.length > 0) {
        const key = pick(sysKeys);
        player.systems[key] = Math.max(0, player.systems[key] - amount);
        if (player.systems[key] <= 0) {
            player.systems[key] = 0;
            if (key === 'shields') player.shields = false;
        }
    }

    player.energy = Math.max(0, player.energy - amount * 500);
    player.energyUsed += amount * 500;

    // Check if all systems destroyed
    const allDead = SYSTEM_KEYS.every(k => player.systems[k] <= 0);
    if (allDead || player.energy <= 0) {
        missionResult = 'SHIP DESTROYED';
        calculateScore();
        hsEntry = isHighScore(finalScore);
        hsName = '';
        hsSaved = false;
        setState(State.DESTROYED);
    }
}

// ============================================================
// EXPLOSIONS
// ============================================================
function spawnExplosion(x, y, z) {
    const particles = [];
    for (let i = 0; i < 20; i++) {
        particles.push({
            x, y, z,
            vx: randRange(-200, 200),
            vy: randRange(-200, 200),
            vz: randRange(-100, 100),
            life: randRange(0.4, 0.9),
            maxLife: 0.9,
        });
    }
    explosions.push({ particles });
}

function updateExplosions(dt) {
    for (let exp of explosions) {
        for (let p of exp.particles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.z += p.vz * dt;
            p.life -= dt;
        }
        exp.particles = exp.particles.filter(p => p.life > 0);
    }
    explosions = explosions.filter(e => e.particles.length > 0);
}

// ============================================================
// SCORE
// ============================================================
function calculateLiveScore() {
    const timePenalty = stardate * 5;
    const energyPenalty = player.energyUsed / 500;
    const sbPenalty = player.starbasesLost * 300;
    return Math.round(player.score - timePenalty - energyPenalty - sbPenalty);
}

function calculateScore() {
    finalScore = calculateLiveScore();
    finalRank = RANKS[0].name;
    for (const r of RANKS) {
        if (finalScore >= r.min) finalRank = r.name;
    }
}

// ============================================================
// HIGH SCORES
// ============================================================
const HIGH_SCORE_KEY = 'starRaidersHighScores';

function loadHighScores() {
    try {
        const data = localStorage.getItem(HIGH_SCORE_KEY);
        return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
}

function saveHighScore(name, score, rank) {
    const scores = loadHighScores();
    scores.push({ name, score, rank, date: new Date().toISOString().split('T')[0] });
    scores.sort((a, b) => b.score - a.score);
    scores.length = Math.min(scores.length, 10);
    try { localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(scores)); } catch(e) {}
    return scores;
}

function isHighScore(score) {
    const scores = loadHighScores();
    return scores.length < 10 || score > scores[scores.length - 1].score;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
    const gp = pollGamepad();

    if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 3);
    if (alertTimer > 0) alertTimer -= dt;

    switch (currentState) {
        case State.TITLE: updateTitle(dt, gp); break;
        case State.DIFFICULTY: updateDifficulty(dt, gp); break;
        case State.FRONT_VIEW:
        case State.AFT_VIEW:
            updateFlightView(dt, gp); break;
        case State.GALACTIC: updateGalactic(dt, gp); break;
        case State.LRS: updateLRS(dt, gp); break;
        case State.HYPERWARP: updateHyperwarp(dt, gp); break;
        case State.DOCKING: updateDocking(dt, gp); break;
        case State.DESTROYED:
        case State.MISSION_END:
            updateEndScreen(dt, gp); break;
        case State.HIGH_SCORES:
            updateHighScores(dt, gp); break;
    }

    justPressed = {};
}

// ============================================================
// STATE UPDATES
// ============================================================
function updateTitle(dt, gp) {
    // Slowly rotate view for title screen starfield
    player.headYaw += 0.1 * dt;
    player.speed = 2;
    // Drift player position forward for star movement
    player.pz += player.speed * 40 * dt;
    updateStars(dt);

    if (wasJustPressed('Enter') || wasJustPressed('Space') || gp?.justPressed.a || gp?.justPressed.start) {
        ensureAudio();
        playSound('select');
        setState(State.DIFFICULTY);
    }
    if (wasJustPressed('KeyT') || gp?.justPressed.y) {
        ensureAudio();
        showHighScores = true;
        setState(State.HIGH_SCORES);
    }
}

function updateDifficulty(dt, gp) {
    if (wasJustPressed('ArrowUp') || gp?.justPressed.dpadUp) {
        difficultyIndex = (difficultyIndex + 3) % 4;
        playSound('select');
    }
    if (wasJustPressed('ArrowDown') || gp?.justPressed.dpadDown) {
        difficultyIndex = (difficultyIndex + 1) % 4;
        playSound('select');
    }
    if (wasJustPressed('Enter') || wasJustPressed('Space') || gp?.justPressed.a || gp?.justPressed.start) {
        playSound('dock');
        startGame();
    }
}

function updateFlightView(dt, gp) {
    stardate += dt * 0.1;

    const TURN_RATE = 0.8; // radians per second at full input

    // Input — heading rate
    player.yawRate = 0; player.pitchRate = 0;
    if (isPressed('ArrowLeft')) player.yawRate = TURN_RATE;
    if (isPressed('ArrowRight')) player.yawRate = -TURN_RATE;
    if (isPressed('ArrowUp')) player.pitchRate = TURN_RATE;
    if (isPressed('ArrowDown')) player.pitchRate = -TURN_RATE;

    // Gamepad analog
    if (gp) {
        if (gp.axes.lx) player.yawRate = -gp.axes.lx * TURN_RATE;
        if (gp.axes.ly) player.pitchRate = -gp.axes.ly * TURN_RATE;
        if (gp.buttons.dpadLeft) player.yawRate = TURN_RATE;
        if (gp.buttons.dpadRight) player.yawRate = -TURN_RATE;
        if (gp.buttons.dpadUp) player.pitchRate = TURN_RATE;
        if (gp.buttons.dpadDown) player.pitchRate = -TURN_RATE;
    }

    // Engine damage reduces turn rate
    const engineFactor = 0.3 + player.systems.engines * 0.7;
    player.yawRate *= engineFactor;
    player.pitchRate *= engineFactor;

    // Apply heading change
    player.headYaw += player.yawRate * dt;
    player.headPitch += player.pitchRate * dt;
    // Wrap pitch to [-PI, PI] for full freedom of movement
    if (player.headPitch > Math.PI) player.headPitch -= Math.PI * 2;
    if (player.headPitch < -Math.PI) player.headPitch += Math.PI * 2;

    // Speed
    if (wasJustPressed('Equal') || wasJustPressed('NumpadAdd') || gp?.justPressed.rb) {
        player.speed = Math.min(MAX_SPEED, player.speed + 1);
    }
    if (wasJustPressed('Minus') || wasJustPressed('NumpadSubtract') || gp?.justPressed.lb) {
        player.speed = Math.max(0, player.speed - 1);
    }
    const maxSpeedWithDamage = Math.ceil(MAX_SPEED * engineFactor);
    player.speed = Math.min(player.speed, maxSpeedWithDamage);

    // Thrust in heading direction — updates world position
    const thrustSpeed = player.speed * 40;
    player.px += Math.sin(player.headYaw) * Math.cos(player.headPitch) * thrustSpeed * dt;
    player.py += Math.sin(player.headPitch) * thrustSpeed * dt;
    player.pz += Math.cos(player.headYaw) * Math.cos(player.headPitch) * thrustSpeed * dt;

    // Fire torpedoes in heading direction from player position
    player.torpedoCooldown = Math.max(0, player.torpedoCooldown - dt);
    if ((isPressed('Space') || gp?.buttons.a || gp?.buttons.rt) && currentState === State.FRONT_VIEW) {
        if (player.torpedoCooldown <= 0 && player.systems.photonTorpedoes > 0 && player.energy >= TORPEDO_COST) {
            player.torpedoCooldown = TORPEDO_COOLDOWN;
            player.energy -= TORPEDO_COST;
            player.energyUsed += TORPEDO_COST;
            const tvx = Math.sin(player.headYaw) * Math.cos(player.headPitch) * TORPEDO_SPEED;
            const tvy = Math.sin(player.headPitch) * TORPEDO_SPEED;
            const tvz = Math.cos(player.headYaw) * Math.cos(player.headPitch) * TORPEDO_SPEED;
            sector.torpedoes.push({
                x: player.px, y: player.py, z: player.pz,
                vx: tvx, vy: tvy, vz: tvz,
                life: TORPEDO_LIFE,
            });
            playSound('fire');
        }
    }

    // View switches
    if (wasJustPressed('KeyF') || (currentState === State.AFT_VIEW && (gp?.justPressed.start))) {
        setState(State.FRONT_VIEW);
    } else if (wasJustPressed('KeyA') || (currentState === State.FRONT_VIEW && gp?.justPressed.start)) {
        setState(State.AFT_VIEW);
    }
    if (wasJustPressed('KeyG') || gp?.justPressed.select) {
        galCursor = { ...galaxy.playerSector };
        setState(State.GALACTIC);
    }
    if (wasJustPressed('KeyL')) setState(State.LRS);

    // Shields toggle
    if (wasJustPressed('KeyS') || gp?.justPressed.b || gp?.justPressed.lt) {
        if (player.systems.shields > 0) {
            player.shields = !player.shields;
            playSound('select');
        }
    }

    // Computer toggle
    if (wasJustPressed('KeyC') || gp?.justPressed.x) {
        if (player.systems.computer > 0) {
            player.computerOn = !player.computerOn;
            playSound('select');
        }
    }

    // Energy drain
    if (player.shields && player.systems.shields > 0) {
        player.energy -= 10 * dt;
        player.energyUsed += 10 * dt;
    }
    player.energy -= player.speed * 3 * dt;
    player.energyUsed += player.speed * 3 * dt;

    if (player.energy <= 0) {
        player.energy = 0;
        missionResult = 'ENERGY DEPLETED';
        calculateScore();
        hsEntry = isHighScore(finalScore);
        hsName = '';
        hsSaved = false;
        setState(State.DESTROYED);
        return;
    }

    // Stardate limit
    if (stardate >= stardateLimit) {
        missionResult = galaxy.totalEnemies > 0 ? 'TIME EXPIRED - ENEMIES REMAIN' : 'MISSION COMPLETE';
        calculateScore();
        hsEntry = isHighScore(finalScore);
        hsName = '';
        hsSaved = false;
        setState(State.MISSION_END);
        return;
    }

    // Victory: all enemies destroyed → auto-advance to new wave
    if (victoryDelay > 0) {
        victoryDelay -= dt;
        if (victoryDelay <= 0) {
            victoryDelay = -1;
            advanceWave();
        }
    }

    // Mothership logic — spawns occasionally during combat, flees after a short window
    const liveEnemies = sector.enemies.filter(e => !e.dead);
    const normalEnemies = liveEnemies.filter(e => e.type !== 'mothership');
    mothershipActive = liveEnemies.some(e => e.type === 'mothership');

    if (!mothershipActive && normalEnemies.length > 0) {
        mothershipTimer -= dt;
        if (mothershipTimer <= 0) {
            // Spawn mothership — arrives from a random direction
            const angle = player.headYaw + randRange(-0.6, 0.6);
            const dist = randRange(800, 1400);
            const et = ENEMY_TYPES.mothership;
            sector.enemies.push({
                type: 'mothership', hp: et.hp, maxHp: et.hp,
                x: player.px + Math.sin(angle) * dist,
                y: player.py + randRange(-100, 100),
                z: player.pz + Math.cos(angle) * dist,
                aiState: 'approach', aiTimer: 1,
                fireCooldown: diff.fireInterval * 0.8,
                fleeTimer: randRange(8, 14), // seconds before it escapes
            });
            alertMessage = 'MOTHERSHIP DETECTED';
            alertTimer = 2;
            playSound('alert');
            mothershipTimer = randRange(30, 60); // next spawn attempt
        }
    } else if (!mothershipActive) {
        mothershipTimer = randRange(15, 30); // reset when no combat
    }

    // Mothership flee timer — remove if time runs out
    for (const e of sector.enemies) {
        if (e.type === 'mothership' && !e.dead) {
            e.fleeTimer -= dt;
            if (e.fleeTimer <= 0) {
                e.dead = true;
                alertMessage = 'MOTHERSHIP ESCAPED';
                alertTimer = 2;
            }
        }
    }

    // Starbase timer
    if (sector.sbTimer > 0) {
        sector.sbTimer -= dt;
        if (player.systems.subspaceRadio > 0) {
            alertMessage = 'STARBASE UNDER ATTACK';
            alertTimer = 0.5;
        }
        if (sector.sbTimer <= 0) {
            const sd = currentSectorData();
            sd.starbase = false;
            sector.starbase = null;
            sector.sbTimer = -1;
            player.starbasesLost++;
            alertMessage = 'STARBASE DESTROYED';
            alertTimer = 3;
            playSound('explosion');
        }
    }

    // Docking check (world-space distance)
    if (sector.starbase && !sector.docked && player.speed <= DOCK_SPEED) {
        const d = dist3D({ x: player.px, y: player.py, z: player.pz }, sector.starbase);
        if (d < DOCK_RANGE && sector.enemies.filter(e => !e.dead).length === 0) {
            dockTimer = 2;
            playSound('dock');
            setState(State.DOCKING);
            return;
        }
    }

    updateStars(dt);
    updateEnemies(dt);
    updateTorpedoes(dt);
    updateExplosions(dt);
}

function updateGalactic(dt, gp) {
    gpCursorCooldown = Math.max(0, gpCursorCooldown - dt);

    if (wasJustPressed('ArrowLeft') || (gp?.justPressed.dpadLeft) || (gp && gp.axes.lx < -0.5 && gpCursorCooldown <= 0)) {
        galCursor.x = Math.max(0, galCursor.x - 1);
        if (gp) gpCursorCooldown = 0.2;
    }
    if (wasJustPressed('ArrowRight') || (gp?.justPressed.dpadRight) || (gp && gp.axes.lx > 0.5 && gpCursorCooldown <= 0)) {
        galCursor.x = Math.min(15, galCursor.x + 1);
        if (gp) gpCursorCooldown = 0.2;
    }
    if (wasJustPressed('ArrowUp') || (gp?.justPressed.dpadUp) || (gp && gp.axes.ly < -0.5 && gpCursorCooldown <= 0)) {
        galCursor.y = Math.max(0, galCursor.y - 1);
        if (gp) gpCursorCooldown = 0.2;
    }
    if (wasJustPressed('ArrowDown') || (gp?.justPressed.dpadDown) || (gp && gp.axes.ly > 0.5 && gpCursorCooldown <= 0)) {
        galCursor.y = Math.min(7, galCursor.y + 1);
        if (gp) gpCursorCooldown = 0.2;
    }

    if (wasJustPressed('KeyH') || gp?.justPressed.y) {
        // Initiate hyperwarp
        warpTarget = { ...galCursor };
        warpFrom = { ...galaxy.playerSector };
        const dist = Math.abs(warpTarget.x - warpFrom.x) + Math.abs(warpTarget.y - warpFrom.y);
        const cost = dist * 100;
        if (player.energy >= cost && dist > 0) {
            warpTimer = HYPERWARP_DURATION;
            // Reset heading so warp always goes straight forward
            player.headYaw = 0;
            player.headPitch = 0;
            player.yawRate = 0;
            player.pitchRate = 0;
            playSound('hyperwarp');
            setState(State.HYPERWARP);
        } else if (dist === 0) {
            setState(prevViewState);
        }
    }

    if (wasJustPressed('KeyF') || gp?.justPressed.a || gp?.justPressed.start) setState(State.FRONT_VIEW);
    if (wasJustPressed('KeyA')) setState(State.AFT_VIEW);
    if (wasJustPressed('KeyL')) setState(State.LRS);
}

function updateLRS(dt, gp) {
    if (wasJustPressed('KeyF') || gp?.justPressed.a || gp?.justPressed.start) setState(State.FRONT_VIEW);
    if (wasJustPressed('KeyA')) setState(State.AFT_VIEW);
    if (wasJustPressed('KeyG') || gp?.justPressed.select) { galCursor = { ...galaxy.playerSector }; setState(State.GALACTIC); }
}

function updateHyperwarp(dt, gp) {
    warpTimer -= dt;
    // During warp, rush player forward so stars streak past
    const warpSpeed = 800;
    player.pz += Math.cos(player.headYaw) * warpSpeed * dt;
    player.px += Math.sin(player.headYaw) * warpSpeed * dt;
    updateStars(dt);

    if (warpTimer <= 0) {
        // Arrive
        const dist = Math.abs(warpTarget.x - warpFrom.x) + Math.abs(warpTarget.y - warpFrom.y);
        player.energy -= dist * 100;
        player.energyUsed += dist * 100;
        stardate += dist * 0.5;

        // Engine damage may cause misalignment
        if (player.systems.engines < 1 && Math.random() > player.systems.engines) {
            warpTarget.x = clamp(warpTarget.x + randInt(-1, 1), 0, 15);
            warpTarget.y = clamp(warpTarget.y + randInt(-1, 1), 0, 7);
            alertMessage = 'HYPERWARP MISALIGNMENT';
            alertTimer = 2;
        }

        galaxy.playerSector = { ...warpTarget };
        generateStars();
        initSector();

        // Red alert on entering enemy sector
        const arrivedSector = currentSectorData();
        if (arrivedSector && arrivedSector.enemies > 0) {
            alertMessage = 'RED ALERT - ENEMIES DETECTED';
            alertTimer = 3;
            playSound('alert');
            flashAlpha = 0.3;
        }

        setState(State.FRONT_VIEW);
    }
}

function updateDocking(dt, gp) {
    dockTimer -= dt;
    if (dockTimer <= 0) {
        // Repair and refuel
        player.energy = MAX_ENERGY;
        for (const k of SYSTEM_KEYS) player.systems[k] = 1;
        player.shields = true;
        alertMessage = 'DOCKING COMPLETE - SYSTEMS REPAIRED';
        alertTimer = 3;
        sector.docked = true;
        // Push starbase away from player so they don't re-dock
        const sbDx = sector.starbase.x - player.px;
        const sbDz = sector.starbase.z - player.pz;
        const sbDist = Math.sqrt(sbDx*sbDx + sbDz*sbDz) || 1;
        sector.starbase.x = player.px + (sbDx / sbDist) * 800;
        sector.starbase.z = player.pz + (sbDz / sbDist) * 800;
        setState(State.FRONT_VIEW);
    }
}

function updateEndScreen(dt, gp) {
    player.headYaw += 0.05 * dt;
    player.pz += 40 * dt;
    updateStars(dt);

    if (hsEntry && !hsSaved) {
        // Name entry mode — handle typing via raw keydown events
        return;
    }

    if (wasJustPressed('KeyT') || gp?.justPressed.y) {
        showHighScores = true;
        setState(State.HIGH_SCORES);
        return;
    }
    if (wasJustPressed('Enter') || wasJustPressed('Space') || gp?.justPressed.a || gp?.justPressed.start) {
        setState(State.TITLE);
        player.speed = 2;
    }
}

// High score name entry — separate keydown handler
document.addEventListener('keydown', e => {
    if ((currentState === State.MISSION_END || currentState === State.DESTROYED) && hsEntry && !hsSaved) {
        if (e.key === 'Backspace') {
            hsName = hsName.slice(0, -1);
        } else if (e.key === 'Enter' && hsName.length > 0) {
            saveHighScore(hsName, finalScore, finalRank);
            hsSaved = true;
            playSound('dock');
        } else if (e.key.length === 1 && hsName.length < 12) {
            hsName += e.key.toUpperCase();
        }
    }
});

function updateHighScores(dt, gp) {
    player.headYaw += 0.05 * dt;
    player.pz += 40 * dt;
    updateStars(dt);
    if (wasJustPressed('Enter') || wasJustPressed('Space') || wasJustPressed('Escape') || gp?.justPressed.a || gp?.justPressed.b) {
        setState(State.TITLE);
        player.speed = 2;
    }
}

// ============================================================
// RENDERING
// ============================================================
function render() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Clip to view area for game content
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, VIEW_H);
    ctx.clip();

    switch (currentState) {
        case State.TITLE: renderTitle(); break;
        case State.DIFFICULTY: renderDifficulty(); break;
        case State.FRONT_VIEW: renderFrontView(); break;
        case State.AFT_VIEW: renderAftView(); break;
        case State.GALACTIC: renderGalactic(); break;
        case State.LRS: renderLRS(); break;
        case State.HYPERWARP: renderHyperwarp(); break;
        case State.DOCKING: renderDocking(); break;
        case State.DESTROYED:
        case State.MISSION_END:
            renderEndScreen(); break;
        case State.HIGH_SCORES:
            renderHighScores(); break;
    }

    // Flash effect
    if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
        ctx.fillRect(0, 0, W, VIEW_H);
    }

    // Scanline overlay
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let y = 0; y < VIEW_H; y += 2) {
        ctx.fillRect(0, y, W, 1);
    }

    ctx.restore();

    // Alert message
    if (alertTimer > 0) {
        const blink = Math.sin(gameTime * 8) > 0;
        const isRedAlert = alertMessage.includes('RED ALERT');
        if (blink || isRedAlert) {
            if (isRedAlert && blink) {
                // Full-width red bar background
                ctx.fillStyle = 'rgba(180,0,0,0.7)';
                ctx.fillRect(0, 4, W, 24);
            }
            if (blink) {
                ctx.fillStyle = isRedAlert ? '#FFFFFF' : COLORS.alert;
                ctx.font = isRedAlert ? 'bold 16px monospace' : '14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(alertMessage, W/2, 22);
                ctx.textAlign = 'left';
            }
        }
    }

    // HUD (always shown except title/difficulty)
    if (currentState !== State.TITLE && currentState !== State.DIFFICULTY && currentState !== State.HIGH_SCORES) {
        renderHUD();
    }
}

// ============================================================
// RENDER - STARS
// ============================================================
function renderStars(aft) {
    for (let s of stars) {
        const v = worldToView(s.x, s.y, s.z, aft);
        if (v.z <= 10) continue;
        const p = project(v.x, v.y, v.z);
        if (!p) continue;
        if (p.sx < 0 || p.sx >= W || p.sy < 0 || p.sy >= VIEW_H) continue;

        ctx.fillStyle = v.z < 200 ? COLORS.star1 : v.z < 600 ? COLORS.star2 : COLORS.star3;
        const size = v.z < 200 ? 2 : 1;
        ctx.fillRect(p.sx, p.sy, size, size);
    }
}

// ============================================================
// RENDER - ENTITIES
// ============================================================
function renderEntity3D(x, y, z, drawFn, aft) {
    const v = worldToView(x, y, z, aft);
    const p = project(v.x, v.y, v.z);
    if (!p) return;
    if (p.sx < -50 || p.sx > W + 50 || p.sy < -50 || p.sy > VIEW_H + 50) return;
    drawFn(p.sx, p.sy, p.scale);
}

function renderEnemies(aft) {
    for (let e of sector.enemies) {
        if (e.dead) continue;
        const color = e.type === 'warrior' ? COLORS.warrior :
                      e.type === 'cruiser' ? COLORS.cruiser :
                      e.type === 'mothership' ? '#FF00FF' : COLORS.basestar;
        const et = ENEMY_TYPES[e.type];

        renderEntity3D(e.x, e.y, e.z, (sx, sy, scale) => {
            const size = clamp(et.size * scale, 3, 60);
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            if (e.type === 'warrior') {
                // Diamond/chevron
                ctx.beginPath();
                ctx.moveTo(sx, sy - size);
                ctx.lineTo(sx + size, sy);
                ctx.lineTo(sx, sy + size * 0.5);
                ctx.lineTo(sx - size, sy);
                ctx.closePath();
                ctx.fill();
            } else if (e.type === 'cruiser') {
                // H-shape
                ctx.fillRect(sx - size, sy - size, size * 0.4, size * 2);
                ctx.fillRect(sx + size * 0.6, sy - size, size * 0.4, size * 2);
                ctx.fillRect(sx - size, sy - size * 0.2, size * 2, size * 0.4);
            } else if (e.type === 'mothership') {
                // Large spaceship — saucer with command bridge and engine glow
                const pulse = 1 + Math.sin(gameTime * 4) * 0.1;
                const s = size * pulse;

                // Main saucer hull (wide ellipse)
                ctx.beginPath();
                ctx.ellipse(sx, sy, s * 1.6, s * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Upper bridge dome
                ctx.fillStyle = '#FFAAFF';
                ctx.beginPath();
                ctx.ellipse(sx, sy - s * 0.35, s * 0.5, s * 0.35, 0, Math.PI, Math.PI * 2);
                ctx.fill();

                // Bridge window stripe
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(sx - s * 0.4, sy - s * 0.38, s * 0.8, s * 0.08);

                // Engine nacelles (two pods at rear)
                ctx.fillStyle = color;
                ctx.fillRect(sx - s * 1.3, sy + s * 0.3, s * 0.4, s * 0.25);
                ctx.fillRect(sx + s * 0.9, sy + s * 0.3, s * 0.4, s * 0.25);

                // Engine glow (pulsing cyan)
                const glowAlpha = 0.5 + Math.sin(gameTime * 8) * 0.3;
                ctx.fillStyle = `rgba(0, 255, 255, ${glowAlpha})`;
                ctx.beginPath();
                ctx.arc(sx - s * 1.1, sy + s * 0.42, s * 0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(sx + s * 1.1, sy + s * 0.42, s * 0.15, 0, Math.PI * 2);
                ctx.fill();

                // Hull detail lines
                ctx.strokeStyle = '#CC66CC';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.ellipse(sx, sy, s * 1.0, s * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Hexagon (basestar)
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = i * Math.PI / 3 + gameTime * 0.5;
                    const px = sx + Math.cos(angle) * size;
                    const py = sy + Math.sin(angle) * size;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            }
        }, aft);
    }
}

function renderTorpedoes(aft) {
    ctx.fillStyle = COLORS.torpedo_player;
    for (let t of sector.torpedoes) {
        renderEntity3D(t.x, t.y, t.z, (sx, sy, scale) => {
            const size = clamp(4 * scale, 2, 8);
            ctx.fillRect(sx - size/2, sy - size/2, size, size);
        }, aft);
    }

    ctx.fillStyle = COLORS.torpedo_enemy;
    for (let t of sector.enemyTorpedoes) {
        renderEntity3D(t.x, t.y, t.z, (sx, sy, scale) => {
            const size = clamp(4 * scale, 2, 8);
            ctx.beginPath();
            ctx.arc(sx, sy, size/2, 0, Math.PI * 2);
            ctx.fill();
        }, aft);
    }
}

function renderExplosions(aft) {
    for (let exp of explosions) {
        for (let p of exp.particles) {
            const frac = p.life / p.maxLife;
            renderEntity3D(p.x, p.y, p.z, (sx, sy, scale) => {
                const r = Math.round(255);
                const g = Math.round(255 * frac);
                const b = Math.round(50 * frac);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                const size = clamp(3 * scale, 1, 6);
                ctx.fillRect(sx, sy, size, size);
            }, aft);
        }
    }
}

function renderStarbase(aft) {
    if (!sector.starbase) return;
    const sb = sector.starbase;
    renderEntity3D(sb.x, sb.y, sb.z, (sx, sy, scale) => {
        const size = clamp(20 * scale, 5, 80);
        ctx.strokeStyle = COLORS.starbase;
        ctx.lineWidth = 2;
        // Cross/station shape
        ctx.beginPath();
        ctx.moveTo(sx, sy - size); ctx.lineTo(sx, sy + size);
        ctx.moveTo(sx - size, sy); ctx.lineTo(sx + size, sy);
        ctx.moveTo(sx - size * 0.6, sy - size * 0.6); ctx.lineTo(sx + size * 0.6, sy + size * 0.6);
        ctx.moveTo(sx + size * 0.6, sy - size * 0.6); ctx.lineTo(sx - size * 0.6, sy + size * 0.6);
        ctx.stroke();
        // Diamond outline
        ctx.beginPath();
        ctx.moveTo(sx, sy - size * 0.8);
        ctx.lineTo(sx + size * 0.8, sy);
        ctx.lineTo(sx, sy + size * 0.8);
        ctx.lineTo(sx - size * 0.8, sy);
        ctx.closePath();
        ctx.stroke();
    }, aft);
}

// ============================================================
// RENDER - CROSSHAIR
// ============================================================
function renderCrosshair() {
    const cx = W / 2, cy = VIEW_H / 2;
    ctx.strokeStyle = 'rgba(0,255,136,0.5)';
    ctx.lineWidth = 1;
    // Cross
    ctx.beginPath();
    ctx.moveTo(cx - 20, cy); ctx.lineTo(cx - 8, cy);
    ctx.moveTo(cx + 8, cy); ctx.lineTo(cx + 20, cy);
    ctx.moveTo(cx, cy - 20); ctx.lineTo(cx, cy - 8);
    ctx.moveTo(cx, cy + 8); ctx.lineTo(cx, cy + 20);
    ctx.stroke();
    // Circle
    ctx.beginPath();
    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
    ctx.stroke();
}

// ============================================================
// RENDER - ATTACK COMPUTER
// ============================================================
function renderAttackComputer() {
    if (!player.computerOn || player.systems.computer <= 0) return;
    if (sector.enemies.length === 0) return;

    // Find nearest enemy (world-space distance to player)
    let nearest = null, nearDist = Infinity;
    for (let e of sector.enemies) {
        if (e.dead) continue;
        const d = dist3D({ x: player.px, y: player.py, z: player.pz }, e);
        if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (!nearest) return;

    // Get enemy position in view space
    const v = worldToView(nearest.x, nearest.y, nearest.z, false);

    const bx = W - 130, by = 10, bw = 120, bh = 100;

    ctx.fillStyle = 'rgba(0,0,40,0.8)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = COLORS.hud_border;
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Direction indicator
    const centerX = bx + bw/2, centerY = by + bh/2 - 10;
    const angle = Math.atan2(v.x, v.z);
    const arrowLen = 30;

    ctx.strokeStyle = COLORS.hud_text;
    ctx.beginPath();
    ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
    ctx.stroke();

    // Arrow pointing to enemy
    const ax = centerX + Math.sin(angle) * arrowLen;
    const ay = centerY - Math.cos(angle) * arrowLen;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(ax, ay);
    ctx.stroke();

    // Dot for enemy
    ctx.fillStyle = COLORS.warrior;
    ctx.beginPath();
    ctx.arc(ax, ay, 3, 0, Math.PI * 2);
    ctx.fill();

    // Distance readout
    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`DST:${Math.round(nearDist)}`, bx + bw/2, by + bh - 5);
    ctx.fillText(v.z < 0 ? 'AFT' : 'FWD', bx + bw/2, by + 12);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - VIEWS
// ============================================================
function renderFrontView() {
    renderStars(false);
    renderStarbase(false);
    renderEnemies(false);
    renderTorpedoes(false);
    renderExplosions(false);
    renderCrosshair();
    renderAttackComputer();
}

function renderAftView() {
    renderStars(true);
    renderStarbase(true);
    renderEnemies(true);
    renderTorpedoes(true);
    renderExplosions(true);

    // Aft label
    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AFT VIEW', W/2, 24);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - GALACTIC CHART
// ============================================================
function renderGalactic() {
    const marginX = 32, marginY = 16;
    const cellW = (W - marginX * 2) / 16;
    const cellH = (VIEW_H - marginY * 2) / 8;

    // Title
    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GALACTIC CHART', W/2, 12);
    ctx.textAlign = 'left';

    // Grid
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
    for (let x = 0; x <= 16; x++) {
        ctx.beginPath();
        ctx.moveTo(marginX + x * cellW, marginY);
        ctx.lineTo(marginX + x * cellW, marginY + 8 * cellH);
        ctx.stroke();
    }
    for (let y = 0; y <= 8; y++) {
        ctx.beginPath();
        ctx.moveTo(marginX, marginY + y * cellH);
        ctx.lineTo(marginX + 16 * cellW, marginY + y * cellH);
        ctx.stroke();
    }

    // Sector contents
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 16; x++) {
            const s = getSector(x, y);
            const cx = marginX + x * cellW + cellW / 2;
            const cy = marginY + y * cellH + cellH / 2;

            // Enemies (red dots, max 3 shown; number overlay for 4+)
            if (s.enemies > 0) {
                ctx.fillStyle = COLORS.warrior;
                const dots = Math.min(s.enemies, 3);
                const dotSpacing = 6;
                const totalW = (dots - 1) * dotSpacing;
                for (let i = 0; i < dots; i++) {
                    ctx.beginPath();
                    ctx.arc(cx - totalW / 2 + i * dotSpacing, cy - 5, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                if (s.enemies > 3) {
                    ctx.font = '8px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.enemies, cx, cy - 8);
                    ctx.textAlign = 'left';
                }
            }

            // Starbase (green diamond)
            if (s.starbase) {
                ctx.fillStyle = COLORS.starbase;
                ctx.beginPath();
                ctx.moveTo(cx, cy + 4);
                ctx.lineTo(cx + 5, cy + 10);
                ctx.lineTo(cx, cy + 16);
                ctx.lineTo(cx - 5, cy + 10);
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    // Player position (blinking white cross)
    if (Math.sin(gameTime * 6) > 0) {
        const px = marginX + galaxy.playerSector.x * cellW + cellW / 2;
        const py = marginY + galaxy.playerSector.y * cellH + cellH / 2;
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px - 6, py); ctx.lineTo(px + 6, py);
        ctx.moveTo(px, py - 6); ctx.lineTo(px, py + 6);
        ctx.stroke();
    }

    // Cursor (blinking yellow box)
    if (Math.sin(gameTime * 8) > -0.3) {
        const cx = marginX + galCursor.x * cellW;
        const cy = marginY + galCursor.y * cellH;
        ctx.strokeStyle = COLORS.cruiser;
        ctx.lineWidth = 2;
        ctx.strokeRect(cx + 1, cy + 1, cellW - 2, cellH - 2);
    }

    // Target info
    const ts = getSector(galCursor.x, galCursor.y);
    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '11px monospace';
    const info = `SECTOR ${galCursor.x},${galCursor.y}  ENEMIES:${ts.enemies}  ${ts.starbase ? 'STARBASE' : ''}`;
    ctx.textAlign = 'center';
    ctx.fillText(info, W/2, VIEW_H - 5);
    ctx.fillText('H=HYPERWARP  F=FRONT VIEW', W/2, VIEW_H - 18);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - LRS (LONG RANGE SCAN)
// ============================================================
function renderLRS() {
    if (player.systems.longRangeScan <= 0) {
        // Show static
        ctx.fillStyle = COLORS.hud_text;
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('LONG RANGE SCAN DAMAGED', W/2, VIEW_H/2);
        ctx.textAlign = 'left';
        // Static noise
        for (let i = 0; i < 500; i++) {
            ctx.fillStyle = `rgba(${randInt(0,100)},${randInt(0,255)},${randInt(0,100)},0.5)`;
            ctx.fillRect(randInt(W/2 - 120, W/2 + 120), randInt(VIEW_H/2 - 80, VIEW_H/2 + 80), 2, 2);
        }
        return;
    }

    const cellSize = 80;
    const ox = W/2 - cellSize * 1.5, oy = VIEW_H/2 - cellSize * 1.5;

    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LONG RANGE SCAN', W/2, oy - 10);

    // 3x3 grid
    ctx.strokeStyle = COLORS.grid_light;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(ox + i * cellSize, oy);
        ctx.lineTo(ox + i * cellSize, oy + 3 * cellSize);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ox, oy + i * cellSize);
        ctx.lineTo(ox + 3 * cellSize, oy + i * cellSize);
        ctx.stroke();
    }

    // Contents
    for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
            const sx = galaxy.playerSector.x + dx;
            const sy = galaxy.playerSector.y + dy;
            const s = getSector(sx, sy);
            const cx = ox + (dx + 1) * cellSize + cellSize / 2;
            const cy = oy + (dy + 1) * cellSize + cellSize / 2;

            if (!s) {
                ctx.fillStyle = '#111133';
                ctx.fillRect(ox + (dx+1)*cellSize + 1, oy + (dy+1)*cellSize + 1, cellSize - 2, cellSize - 2);
                continue;
            }

            // Center marker for player
            if (dx === 0 && dy === 0) {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(cx - 2, cy - 2, 4, 4);
            }

            // Enemies
            if (s.enemies > 0) {
                ctx.fillStyle = COLORS.warrior;
                for (let i = 0; i < s.enemies; i++) {
                    ctx.beginPath();
                    ctx.arc(cx - 15 + i * 12, cy - 15, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Starbase
            if (s.starbase) {
                ctx.fillStyle = COLORS.starbase;
                ctx.beginPath();
                ctx.moveTo(cx + 15, cy + 10);
                ctx.lineTo(cx + 22, cy + 18);
                ctx.lineTo(cx + 15, cy + 26);
                ctx.lineTo(cx + 8, cy + 18);
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - HYPERWARP
// ============================================================
function renderHyperwarp() {
    // Star streaks
    for (let s of stars) {
        const v = worldToView(s.x, s.y, s.z, false);
        if (v.z <= 10) continue;
        const p = project(v.x, v.y, v.z);
        if (!p) continue;
        if (p.sx < 0 || p.sx >= W || p.sy < 0 || p.sy >= VIEW_H) continue;

        // Draw as streak lines away from center
        const dx = p.sx - W/2;
        const dy = p.sy - VIEW_H/2;
        const len = 20 + clamp(1 - v.z / STAR_RANGE, 0, 1) * 30;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;

        ctx.strokeStyle = COLORS.star1;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.sx, p.sy);
        ctx.lineTo(p.sx + dx/dist * len, p.sy + dy/dist * len);
        ctx.stroke();
    }

    // Concentric rings
    const progress = 1 - warpTimer / HYPERWARP_DURATION;
    ctx.strokeStyle = `rgba(80,60,200,${0.3 + Math.sin(gameTime * 10) * 0.15})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
        const phase = (progress * 5 + i * 0.3) % 1;
        const r = phase * 350;
        ctx.beginPath();
        ctx.arc(W/2, VIEW_H/2, r, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Countdown
    const countdown = Math.ceil(warpTimer * 3);
    ctx.fillStyle = COLORS.hud_text;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`WARP ${countdown}`, W/2, VIEW_H/2 + 8);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - DOCKING
// ============================================================
function renderDocking() {
    const progress = 1 - dockTimer / 2;

    // Growing station
    const size = 20 + progress * 300;
    ctx.strokeStyle = COLORS.starbase;
    ctx.lineWidth = 2 + progress * 3;
    ctx.beginPath();
    ctx.moveTo(W/2, VIEW_H/2 - size);
    ctx.lineTo(W/2 + size, VIEW_H/2);
    ctx.lineTo(W/2, VIEW_H/2 + size);
    ctx.lineTo(W/2 - size, VIEW_H/2);
    ctx.closePath();
    ctx.stroke();

    // Flash at end
    if (progress > 0.8) {
        ctx.fillStyle = `rgba(255,255,255,${(progress - 0.8) * 5})`;
        ctx.fillRect(0, 0, W, VIEW_H);
    }

    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DOCKING...', W/2, VIEW_H/2 + size + 30);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - TITLE
// ============================================================
function renderTitle() {
    renderStars(false);

    // Title text with glow
    ctx.fillStyle = COLORS.title;
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAR RAIDERS', W/2, VIEW_H/2 - 40);

    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '14px monospace';
    ctx.fillText('BASED ON THE CLASSIC ATARI GAME', W/2, VIEW_H/2);

    // Blink prompt
    if (Math.sin(gameTime * 3) > 0) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px monospace';
        ctx.fillText('PRESS ENTER TO START', W/2, VIEW_H/2 + 60);
    }

    ctx.font = '12px monospace';
    ctx.fillStyle = '#666688';
    ctx.fillText('KEYBOARD OR GAMEPAD', W/2, VIEW_H/2 + 95);
    ctx.fillText('T = HIGH SCORES', W/2, VIEW_H/2 + 115);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - DIFFICULTY
// ============================================================
function renderDifficulty() {
    const descs = [
        '8 enemy groups — gentle introduction',
        '12 enemy groups — a fair challenge',
        '20 enemy groups — intense combat',
        '28 enemy groups — survival unlikely',
    ];

    const blockH = 4 * 42 + 30; // items + footer
    const topY = (VIEW_H - blockH) / 2;

    ctx.fillStyle = COLORS.title;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SELECT DIFFICULTY', W/2, topY);

    for (let i = 0; i < 4; i++) {
        const y = topY + 40 + i * 42;
        const selected = i === difficultyIndex;
        ctx.fillStyle = selected ? '#FFFFFF' : '#555577';
        ctx.font = `${selected ? 'bold ' : ''}16px monospace`;
        ctx.fillText(DIFFICULTY[i].name, W/2, y);
        if (selected) {
            // Selection arrows
            const tw = ctx.measureText(DIFFICULTY[i].name).width;
            ctx.fillText('\u25B6', W/2 - tw/2 - 20, y);
            ctx.fillText('\u25C0', W/2 + tw/2 + 20, y);
            // Description
            ctx.fillStyle = COLORS.hud_text;
            ctx.font = '11px monospace';
            ctx.fillText(descs[i], W/2, y + 16);
        }
    }

    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '12px monospace';
    ctx.fillText('PRESS ENTER TO BEGIN', W/2, topY + 40 + 4 * 42 + 10);
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - END SCREEN
// ============================================================
function renderEndScreen() {
    renderStars(false);

    const labelX = 180;
    const valueX = 440;

    ctx.fillStyle = currentState === State.DESTROYED ? COLORS.alert : COLORS.title;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(missionResult, W/2, 30);
    ctx.textAlign = 'left';

    ctx.font = '14px monospace';
    const startY = 62;
    const lineH = 22;

    const rows = [
        ['ENEMIES DESTROYED', player.enemiesDestroyed],
        ['STARBASES LOST', player.starbasesLost],
        ['ENERGY USED', Math.round(player.energyUsed)],
        ['STARDATES', stardate.toFixed(1)],
    ];

    for (let i = 0; i < rows.length; i++) {
        const y = startY + i * lineH;
        ctx.fillStyle = COLORS.hud_text;
        ctx.fillText(rows[i][0], labelX, y);
        ctx.textAlign = 'right';
        ctx.fillText(String(rows[i][1]), valueX, y);
        ctx.textAlign = 'left';
    }

    // Divider
    const divY = startY + rows.length * lineH + 8;
    ctx.strokeStyle = COLORS.hud_border;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(labelX, divY);
    ctx.lineTo(valueX, divY);
    ctx.stroke();

    // Score and rank
    ctx.font = 'bold 18px monospace';
    const scoreY = divY + 25;
    ctx.fillStyle = finalScore >= 0 ? COLORS.hud_text : COLORS.alert;
    ctx.fillText('SCORE', labelX, scoreY);
    ctx.textAlign = 'right';
    ctx.fillText(String(finalScore), valueX, scoreY);
    ctx.textAlign = 'left';

    ctx.fillStyle = COLORS.cruiser;
    ctx.fillText('RANK', labelX, scoreY + 28);
    ctx.textAlign = 'right';
    ctx.fillText(finalRank, valueX, scoreY + 28);
    ctx.textAlign = 'left';

    const bottomY = scoreY + 65;

    // High score entry
    if (hsEntry && !hsSaved) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('NEW HIGH SCORE! ENTER YOUR NAME:', W/2, bottomY);
        ctx.font = 'bold 20px monospace';
        ctx.fillStyle = COLORS.cruiser;
        const cursor = Math.sin(gameTime * 5) > 0 ? '_' : ' ';
        ctx.fillText(hsName + cursor, W/2, bottomY + 28);
        ctx.textAlign = 'left';
    } else {
        // Show prompts
        ctx.textAlign = 'center';
        ctx.font = '12px monospace';
        if (hsSaved) {
            ctx.fillStyle = COLORS.starbase;
            ctx.fillText('SCORE SAVED!', W/2, bottomY);
        }
        if (Math.sin(gameTime * 3) > 0) {
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '14px monospace';
            ctx.fillText('ENTER=MENU  T=HIGH SCORES', W/2, bottomY + 22);
        }
        ctx.textAlign = 'left';
    }
}

function renderHighScores() {
    renderStars(false);

    ctx.fillStyle = COLORS.title;
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORES', W/2, 35);

    const scores = loadHighScores();
    ctx.font = '14px monospace';

    if (scores.length === 0) {
        ctx.fillStyle = '#666688';
        ctx.fillText('NO SCORES YET', W/2, VIEW_H/2);
    } else {
        const startY = 70;
        const lineH = 24;
        for (let i = 0; i < scores.length; i++) {
            const y = startY + i * lineH;
            const s = scores[i];
            const isNew = hsSaved && s.name === hsName && s.score === finalScore;
            ctx.fillStyle = isNew ? COLORS.cruiser : COLORS.hud_text;
            ctx.textAlign = 'right';
            ctx.fillText(`${i + 1}.`, 130, y);
            ctx.textAlign = 'left';
            ctx.fillText(s.name, 145, y);
            ctx.textAlign = 'right';
            ctx.fillText(String(s.score), 430, y);
            ctx.textAlign = 'left';
            ctx.fillStyle = isNew ? COLORS.cruiser : '#666688';
            ctx.fillText(s.rank, 445, y);
        }
    }

    if (Math.sin(gameTime * 3) > 0) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PRESS ENTER', W/2, VIEW_H - 20);
    }
    ctx.textAlign = 'left';
}

// ============================================================
// RENDER - HUD
// ============================================================
function renderHUD() {
    const y0 = VIEW_H;

    // Background
    ctx.fillStyle = COLORS.hud_bg;
    ctx.fillRect(0, y0, W, HUD_H);

    // Top border
    ctx.strokeStyle = COLORS.hud_border;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, y0); ctx.lineTo(W, y0);
    ctx.stroke();

    ctx.fillStyle = COLORS.hud_text;
    ctx.font = '13px monospace';

    // Row 1
    const r1y = y0 + 20;
    ctx.fillText(`VEL: ${player.speed}`, 15, r1y);
    ctx.fillText(`SECTOR: ${galaxy.playerSector.x},${galaxy.playerSector.y}`, 120, r1y);
    ctx.fillText(`ENERGY: ${Math.max(0, Math.round(player.energy))}`, 290, r1y);
    ctx.fillText(`SHIELDS: ${player.shields ? 'ON' : 'OFF'}`, 430, r1y);
    ctx.fillText(`COMP: ${player.computerOn && player.systems.computer > 0 ? 'ON' : 'OFF'}`, 570, r1y);

    // Row 2
    const r2y = y0 + 40;
    const viewLabel = currentState === State.AFT_VIEW ? 'AFT' :
                      currentState === State.GALACTIC ? 'CHART' :
                      currentState === State.LRS ? 'LRS' :
                      currentState === State.HYPERWARP ? 'WARP' : 'FORE';
    ctx.fillText(`VIEW: ${viewLabel}`, 15, r2y);
    ctx.fillText(`DATE: ${stardate.toFixed(1)}/${stardateLimit.toFixed(0)}`, 120, r2y);
    ctx.fillText(`SCORE: ${calculateLiveScore()}`, 290, r2y);

    const sectorTargets = sector.enemies ? sector.enemies.filter(e => !e.dead).length : 0;
    ctx.fillText(`TARGETS: ${sectorTargets}`, 430, r2y);
    ctx.fillText(`WAVE: ${waveNumber}`, 570, r2y);

    // System damage indicators
    const sysX = 15;
    const sysY = y0 + 60;
    ctx.font = '10px monospace';
    for (let i = 0; i < SYSTEM_KEYS.length; i++) {
        const val = player.systems[SYSTEM_KEYS[i]];
        const x = sysX + i * 105;
        const color = val >= 0.7 ? COLORS.ok : val > 0 ? COLORS.warn : COLORS.bad;

        ctx.fillStyle = color;
        ctx.fillRect(x, sysY - 8, 8, 8);
        ctx.fillStyle = '#889988';
        ctx.fillText(SYSTEM_NAMES[i], x + 12, sysY);
    }

    // Controls hint (small text)
    ctx.fillStyle = '#334433';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('F=FORE A=AFT G=CHART L=LRS S=SHIELD C=COMP H=WARP +/-=SPD SPACE=FIRE', W - 10, y0 + 74);
    ctx.textAlign = 'left';
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05); // cap at 50ms
    lastTimestamp = timestamp;
    gameTime += dt;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
}

// Prevent justPressed from accumulating before first frame
function clearJustPressed() { for (const k in justPressed) delete justPressed[k]; }

// Start
player = { speed: 0, px: 0, py: 0, pz: 0, headYaw: 0, headPitch: 0, yawRate: 0, pitchRate: 0, shields: false, systems: { engines:1, shields:1, computer:1, longRangeScan:1, subspaceRadio:1, photonTorpedoes:1 }, computerOn: true, torpedoCooldown: 0, energy: 9999, energyUsed: 0, score: 0, enemiesDestroyed: 0, starbasesLost: 0 };
generateStars();
galaxy = { sectors: [], playerSector: { x: 0, y: 0 }, totalEnemies: 0 };
sector = { enemies: [], torpedoes: [], enemyTorpedoes: [], starbase: null, sbTimer: -1, docked: false };
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
